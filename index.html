<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Decimal Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link id="theme" rel="stylesheet" href="style-crt.css">
  <script>
    (function () {
      var themes = ['style-crt.css', 'style-dark.css', 'style-minimal.css', 'style-7seg.css'];
      var saved = localStorage.getItem('mt-theme');
      if (saved && themes.indexOf(saved) !== -1) {
        document.getElementById('theme').href = saved;
      }
    })();
  </script>
</head>
<body>
  <div class="panel">
    <div class="panel-label">Decimal Time</div>

    <div class="date-row">
      <div class="segment-group">
        <div class="digit-wrap" id="dMonth"></div>
        <div class="seg-label">Month</div>
      </div>

      <div class="segment-group">
        <div class="digit-wrap" id="dWeek"></div>
        <div class="seg-label">Week</div>
      </div>

      <div class="segment-group">
        <div class="digit-wrap" id="dDay"></div>
        <div class="seg-label">Day</div>
      </div>
    </div>

    <div class="clock-row">
      <div class="segment-group">
        <div class="digit-wrap" id="dh"></div>
        <div class="seg-label">Hour</div>
      </div>

      <span class="colon">:</span>

      <div class="segment-group">
        <div class="digit-wrap" id="dm"></div>
        <div class="seg-label">Minutes</div>
      </div>

      <span class="colon">:</span>

      <div class="segment-group">
        <div class="digit-wrap" id="ds"></div>
        <div class="seg-label">Seconds</div>
      </div>
    </div>

    <div class="explain">
      <div class="desc">
        1 month = 100 days · 1 week = 10 days
      </div>
      <div class="desc" style="margin-top:6px;">
        1 day = 10 hours · 1 hour = 100 minutes · 1 minute = 100 seconds · 1 second ≈ 0.864 real seconds
      </div>
    </div>
  </div>

  <a id="conv-link" href="about.html">About</a>
  <a id="about-link" href="conversion.html">Conversion</a>
  <button id="style-btn">Style</button>

  <script>
    const $ = id => document.getElementById(id);
    const z = (n, len) => String(n).padStart(len, '0');

    const themes = ['style-crt.css', 'style-dark.css', 'style-minimal.css', 'style-7seg.css'];
    const labels = ['CRT', 'Dark', 'Minimal', '7-SEG'];
    let themeIndex = Math.max(0, themes.indexOf($('theme').getAttribute('href')));

    const btn = $('style-btn');
    btn.addEventListener('click', () => {
      themeIndex = (themeIndex + 1) % themes.length;
      $('theme').href = themes[themeIndex];
      localStorage.setItem('mt-theme', themes[themeIndex]);
      btn.textContent = labels[(themeIndex + 1) % themes.length];
      // rebuild all digits so segment spans are present for the 7-seg theme
      Object.values(digitEls).forEach(([el, digits]) => {
        el.dataset.last = '';
        setDigits(el, parseInt(el.dataset.lastVal || '0'), digits);
      });
    });
    btn.textContent = labels[(themeIndex + 1) % themes.length];

    const SEG_NAMES = ['a','b','c','d','e','f','g'];

    function setDigits(el, value, digits) {
      const str = z(value, digits);
      el.dataset.lastVal = str;
      if (el.dataset.last === str) return;
      el.dataset.last = str;
      el.innerHTML = '';
      for (const ch of str) {
        const cell = document.createElement('span');
        cell.className = 'digit-cell';
        cell.dataset.val = ch;
        const ghost = document.createElement('span');
        ghost.className = 'ghost-char';
        ghost.textContent = '8';
        const val = document.createElement('span');
        val.className = 'val-char';
        val.textContent = ch;
        cell.appendChild(ghost);
        cell.appendChild(val);
        for (const s of SEG_NAMES) {
          const seg = document.createElement('span');
          seg.className = 'seg seg-' + s;
          cell.appendChild(seg);
        }
        el.appendChild(cell);
      }
    }

    // track els for theme-switch rebuild
    const digitEls = {};

    // Epoch: 2021-12-21 15:59:18 UTC — the December solstice instant that came
    // closest to a whole UTC hour in the entire leap-second era (1972–2100).
    // Only 42 s before 16:00:00 UTC. Unix timestamp: 1640102358.
    // Verified against JPL ephemeris data (Skyfield / NAIF kernels).
    //
    // Metric year 302022 begins at this moment. All subsequent year boundaries
    // are computed forward using the leap day rule:
    //   - divisible by 4   → leap year (366 days)
    //   - divisible by 128 → NOT a leap year (overrides ÷4)
    // Yields 365.2421875 days/year — drifts < 1 day per 100,000 years.
    //
    // Time pipeline (fully UTC-continuous, no local-midnight dependency):
    //   metric_seconds = (Date.now() - EPOCH_UTC_MS) / 864
    //   days_since_epoch = floor(metric_seconds / 100000)
    //   time_of_day      = floor(metric_seconds % 100000)   [0–99999]
    const EPOCH_UTC_MS    = Date.UTC(2021, 11, 21, 15, 59, 18, 0); // 1640102358000
    const EPOCH_METRIC_YEAR = 302022;

    function isMetricLeapYear(y) {
      return y % 4 === 0 && y % 128 !== 0;
    }

    function metricYearLength(y) {
      return isMetricLeapYear(y) ? 366 : 365;
    }

    function metricDate(nowMs) {
      const totalMetricSec = (nowMs - EPOCH_UTC_MS) / 864;
      const totalDays = Math.floor(totalMetricSec / 100000);
      const timeOfDay  = Math.floor(totalMetricSec % 100000);

      let year      = EPOCH_METRIC_YEAR;
      let remaining = totalDays;

      if (remaining >= 0) {
        while (remaining >= metricYearLength(year)) {
          remaining -= metricYearLength(year);
          year++;
        }
      } else {
        while (remaining < 0) {
          year--;
          remaining += metricYearLength(year);
        }
      }

      return { metricYear: year, dayOfYear: remaining, timeOfDay };
    }

    function tick() {
      const { dayOfYear, timeOfDay } = metricDate(Date.now());

      setDigits($('dMonth'), (dayOfYear / 100) | 0,           1);
      setDigits($('dWeek'),  ((dayOfYear % 100) / 10) | 0,    1);
      setDigits($('dDay'),   dayOfYear % 10,                   1);

      setDigits($('dh'), (timeOfDay / 10000) | 0,             1);
      setDigits($('dm'), (timeOfDay % 10000 / 100) | 0,       2);
      setDigits($('ds'), timeOfDay % 100,                      2);

      // register for theme-switch rebuilds (only needs to happen once)
      if (!digitEls.dMonth) {
        digitEls.dMonth = [$('dMonth'), 1];
        digitEls.dWeek  = [$('dWeek'),  1];
        digitEls.dDay   = [$('dDay'),   1];
        digitEls.dh     = [$('dh'),     1];
        digitEls.dm     = [$('dm'),     2];
        digitEls.ds     = [$('ds'),     2];
      }
    }

    tick();
    setInterval(tick, 100);
  </script>
</body>
</html>
